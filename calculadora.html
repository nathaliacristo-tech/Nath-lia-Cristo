<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora da Nathália</title>
    <style>
        /* Estilização Geral da Página */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6f0; /* Fundo da página rosa claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Estrutura da Calculadora */
        .calculadora {
            background-color: #ffb6c1; /* Corpo da calculadora rosa pastel */
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(219, 112, 147, 0.4);
            width: 320px;
        }

        /* Topo com o Nome da Nathália */
        .marca-nathalia {
            text-align: center;
            color: #d11a5b; /* Texto rosa escuro */
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        /* Visor de Exibição */
        .visor {
            width: 100%;
            height: 65px;
            background-color: #fff0f5; /* Fundo do visor rosa bem clarinho */
            border: 2px solid #ff69b4;
            border-radius: 12px;
            color: #d11a5b; /* Números em rosa escuro */
            font-size: 2.2rem;
            text-align: right;
            padding: 0 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* Grade de Botões */
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        /* Botões Numéricos */
        button {
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            color: #d11a5b;
            background-color: #fff; /* Botões brancos para dar contraste */
            box-shadow: 0 3px 0px #e6a1ac;
        }

        button:hover {
            background-color: #ffeef4;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* Botões de Operação (+, -, *, /) */
        .operador {
            background-color: #ff69b4; /* Rosa Choque */
            color: #ffffff;
            box-shadow: 0 3px 0px #cc5289;
        }

        .operador:hover {
            background-color: #ff4fa8;
        }

        /* Botão de Limpar (C e apagar) */
        .limpar {
            background-color: #ffb3d1; /* Rosa médio */
            color: #d11a5b;
            box-shadow: 0 3px 0px #e69cb9;
        }

        .limpar:hover {
            background-color: #ffa3c7;
        }

        /* Botão de Igual (=) */
        .igual {
            background-color: #d11a5b; /* Rosa Escuro Forte */
            color: #ffffff;
            grid-column: span 2;
            box-shadow: 0 3px 0px #9e1343;
        }

        .igual:hover {
            background-color: #b5124e;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <!-- Nome personalizado no topo -->
        <div class="marca-nathalia">✨ Nathália ✨</div>

        <!-- Visor onde os números aparecem -->
        <input type="text" id="visor" class="visor" readonly value="0">
        
        <!-- Teclado da Calculadora -->
        <div class="botoes">
            <button class="limpar" onclick="limparVisor()">C</button>
            <button onclick="adicionarCaractere('/')" class="operador">÷</button>
            <button onclick="adicionarCaractere('*')" class="operador">×</button>
            <button onclick="apagarUltimo()" class="limpar">⌫</button>

            <button onclick="adicionarCaractere('7')">7</button>
            <button onclick="adicionarCaractere('8')">8</button>
            <button onclick="adicionarCaractere('9')">9</button>
            <button onclick="adicionarCaractere('-')" class="operador">-</button>

            <button onclick="adicionarCaractere('4')">4</button>
            <button onclick="adicionarCaractere('5')">5</button>
            <button onclick="adicionarCaractere('6')">6</button>
            <button onclick="adicionarCaractere('+')" class="operador">+</button>

            <button onclick="adicionarCaractere('1')">1</button>
            <button onclick="adicionarCaractere('2')">2</button>
            <button onclick="adicionarCaractere('3')">3</button>
            
            <button onclick="calcularResultado()" class="igual">=</button>

            <button onclick="adicionarCaractere('0')" style="grid-column: span 2;">0</button>
            <button onclick="adicionarCaractere('.')">.</button>
        </div>
    </div>

    <script>
        const visor = document.getElementById('visor');

        function adicionarCaractere(caractere) {
            if (visor.value === '0' && !isNaN(caractere)) {
                visor.value = caractere;
            } else {
                visor.value += caractere;
            }
        }

        function limparVisor() {
            visor.value = '0';
        }

        function apagarUltimo() {
            if (visor.value.length > 1) {
                visor.value = visor.value.slice(0, -1);
            } else {
                visor.value = '0';
            }
        }

        function calcularResultado() {
            try {
                const resultado = eval(visor.value);
                visor.value = resultado;
            } catch (error) {
                visor.value = 'Erro';
            }
        }
    </script>

</body>
</html>
