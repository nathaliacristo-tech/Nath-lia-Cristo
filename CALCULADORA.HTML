<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderna</title>
    <style>
        /* Estilização Geral da Página */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121214;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Estrutura da Calculadora */
        .calculadora {
            background-color: #202024;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            width: 320px;
        }

        /* Visor de Exibição */
        .visor {
            width: 100%;
            height: 60px;
            background-color: #121214;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 0 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        /* Grade de Botões */
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        /* Botões Gerais */
        button {
            height: 60px;
            border: none;
            border-radius: 8px;
            font-size: 1.25rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            color: #ffffff;
            background-color: #29292e;
        }

        button:hover {
            background-color: #323238;
        }

        /* Botões de Operação (+, -, *, /) */
        .operador {
            background-color: #ff9000;
            color: #121214;
        }

        .operador:hover {
            background-color: #e68200;
        }

        /* Botão de Limpar (C) */
        .limpar {
            background-color: #7c7c8a;
            color: #ffffff;
        }

        .limpar:hover {
            background-color: #9494a6;
        }

        /* Botão de Igual (=) */
        .igual {
            background-color: #04d361;
            color: #121214;
            grid-column: span 2; /* Ocupa duas colunas */
        }

        .igual:hover {
            background-color: #04b352;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <!-- Visor onde os números aparecem -->
        <input type="text" id="visor" class="visor" readonly value="0">
        
        <!-- Teclado da Calculadora -->
        <div class="botoes">
            <button class="limpar" onclick="limparVisor()">C</button>
            <button onclick="adicionarCaractere('/')" class="operador">÷</button>
            <button onclick="adicionarCaractere('*')" class="operador">×</button>
            <button onclick="apagarUltimo()" class="limpar">⌫</button>

            <button onclick="adicionarCaractere('7')">7</button>
            <button onclick="adicionarCaractere('8')">8</button>
            <button onclick="adicionarCaractere('9')">9</button>
            <button onclick="adicionarCaractere('-')" class="operador">-</button>

            <button onclick="adicionarCaractere('4')">4</button>
            <button onclick="adicionarCaractere('5')">5</button>
            <button onclick="adicionarCaractere('6')">6</button>
            <button onclick="adicionarCaractere('+')" class="operador">+</button>

            <button onclick="adicionarCaractere('1')">1</button>
            <button onclick="adicionarCaractere('2')">2</button>
            <button onclick="adicionarCaractere('3')">3</button>
            
            <button onclick="calcularResultado()" class="igual">=</button>

            <button onclick="adicionarCaractere('0')" style="grid-column: span 2;">0</button>
            <button onclick="adicionarCaractere('.')">.</button>
        </div>
    </div>

    <script>
        const visor = document.getElementById('visor');

        // Adiciona números ou operadores ao visor
        function adicionarCaractere(caractere) {
            if (visor.value === '0' && !isNaN(caractere)) {
                visor.value = caractere;
            } else {
                visor.value += caractere;
            }
        }

        // Limpa totalmente o visor (Botão C)
        function limparVisor() {
            visor.value = '0';
        }

        // Apaga o último caractere digitado (Botão ⌫)
        function apagarUltimo() {
            if (visor.value.length > 1) {
                visor.value = visor.value.slice(0, -1);
            } else {
                visor.value = '0';
            }
        }

        // Executa a expressão matemática contida no visor
        function calcularResultado() {
            try {
                // O método eval calcula a string diretamente
                const resultado = eval(visor.value);
                visor.value = resultado;
            } catch (error) {
                visor.value = 'Erro';
            }
        }
    </script>

</body>
</html>
